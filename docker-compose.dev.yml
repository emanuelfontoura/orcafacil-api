services:
  api_dev:
    build: .
    container_name: orcafacil-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres_dev
      - redis_dev
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  postgres_dev:
    image: postgres:15
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis_dev:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data: