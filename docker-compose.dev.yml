services:
  api_dev:
    build: .
    container_name: orcafacil-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres_dev:
        condition: service_healthy
      redis_dev:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  postgres_dev:
    image: postgres:15
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_dev:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data: